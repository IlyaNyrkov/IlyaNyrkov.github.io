---
layout: default
title: Home
---

<ul style="list-style-type: disc; padding-left: 20px;">
  {% for post in site.posts %}
    <li style="margin-bottom: 2rem;">
      <h2 style="color: #b22222;">
        <a href="{{ post.url }}" style="color: inherit; text-decoration: none;">
          {{ post.title }}
        </a>
      </h2>
      
      <p>{{ post.excerpt }}</p> 
    </li>
  {% endfor %}
</ul>
