<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title }}</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
    <header style="text-transform: uppercase; font-weight: bold; font-size: 1.2rem; margin-top: 4rem; margin-bottom: 1rem;">
        
        <a href="/" style="color: #2563eb; text-decoration: none; margin-right: 15px;">
            {% if page.url == "/" or page.url == "/index.html" %}
                &lt;NYRKOV&gt;
            {% else %}
                NYRKOV
            {% endif %}
        </a>

        <a href="/about" style="color: #2563eb; text-decoration: none;">
            {% if page.url contains "about" %}
                &lt;ABOUT&gt;
            {% else %}
                ABOUT
            {% endif %}
        </a>

    </header>

    <main>
        {{ content }} 
    </main>
</body>
</html>
